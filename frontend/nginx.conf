server {
    listen 80;
    server_name localhost;

    # Thư mục gốc chứa các file tĩnh đã build của React (Vite)
    root /usr/share/nginx/html;
    index index.html;

    # Cấu hình xử lý Route của React Router (Single Page Application)
    # Nếu truy cập một đường dẫn ảo (vd: /admin, /lecturer), Nginx sẽ tự động
    # trả về file index.html để React Router tự điều hướng, tránh lỗi 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cấu hình cache cho các file tĩnh để tăng tốc tải trang
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
