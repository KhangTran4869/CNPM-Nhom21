services:
  mongodb:
    image: mongo:7
    container_name: cnpm21-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    image: node:22-alpine
    container_name: cnpm21-backend
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "test -f node_modules/express/package.json || npm ci --no-bin-links --no-audit --fund=false && npm run dev"

  frontend:
    image: node:22-alpine
    container_name: cnpm21-frontend
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api/v1
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "test -f node_modules/vite/bin/vite.js || npm ci --no-bin-links --no-audit --fund=false && npm run dev -- --host 0.0.0.0"

  seed-admin:
    image: node:22-alpine
    profiles:
      - seed
    working_dir: /app
    depends_on:
      - mongodb
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "test -f node_modules/express/package.json || npm ci --no-bin-links --no-audit --fund=false && npm run seed:admin && npm run seed:lecturer && npm run seed:assignment-data"

volumes:
  mongodb_data:
  backend_node_modules:
  frontend_node_modules:
